<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DH ADMIN PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  padding: 15px;
  background: black;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
}

.controls {
  display: flex;
  gap: 10px;
  padding: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #1f1f1f;
  color: white;
  transition: 0.2s;
}

button:hover {
  background: #333;
  transform: scale(1.05);
}

button:active {
  transform: scale(0.95);
}

.card {
  background: #1a1a1a;
  margin: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #2a2a2a;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.4s forwards;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 10px #000;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.ok { color: lime; }
.warn { color: orange; }
.danger { color: red; }

.ok {
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.5; }
  100% { opacity: 1; }
}
</style>
</head>

<body>

<div class="header">🚀 DH CONTROL PRO</div>

<div class="controls">
  <button onclick="resetAll()">Reset Todo</button>
  <button onclick="resetNombres()">Reset Nombres</button>
</div>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCzhOH6v1EcAeYQLDtYgUPsxQFUb_xeTE",
  authDomain: "nfc-control-b33f4.firebaseapp.com",
  projectId: "nfc-control-b33f4",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

// nombres
let nombres = JSON.parse(localStorage.getItem("nfcNombres")) || {};

function guardarNombres() {
  localStorage.setItem("nfcNombres", JSON.stringify(nombres));
}

window.editarNombre = function(id) {
  let actual = nombres[id] || "";
  let nuevo = prompt("Nombre para " + id, actual);

  if (nuevo !== null) {
    nombres[id] = nuevo.trim() || "Sin nombre";
    guardarNombres();
  }
}

window.resetNombres = function() {
  if (!confirm("¿Borrar nombres?")) return;
  localStorage.removeItem("nfcNombres");
  nombres = {};
}

// 🔥 TIEMPO REAL
onSnapshot(collection(db, "nfc_links"), (snap) => {

  list.innerHTML = "";

  snap.forEach(d => {

    const data = d.data();

    let estado = "🟢 LIBRE";
    let color = "ok";

    if (data.device) {
      estado = "🔒 EN USO";
      color = "warn";
    }

    if (data.intentos > 0) {
      estado = "🚫 INTENTOS DETECTADOS";
      color = "danger";
    }

    let nombre = nombres[d.id] || "Sin nombre";

    list.innerHTML += `
      <div class="card">
        <b>${d.id}</b><br><br>

        👤 ${nombre}<br>
        <button onclick="editarNombre('${d.id}')">✏️</button><br><br>

        📱 ${data.device || "—"}<br>
        🕒 ${data.fecha || "—"}<br><br>

        🔢 ${data.accesos || 0} accesos<br>
        🚫 ${data.intentos || 0} intentos<br><br>

        <span class="${color}">${estado}</span><br><br>

        <button onclick="reset('${d.id}')">Reset</button>
      </div>
    `;
  });

});

// reset individual
window.reset = async function(id) {
  if (!confirm("¿Resetear " + id + "?")) return;

  await setDoc(doc(db, "nfc_links", id), {
    device: "",
    status: "libre",
    accesos: 0,
    intentos: 0,
    fecha: ""
  });
}

// reset total
window.resetAll = async function() {
  if (!confirm("¿Resetear todo?")) return;

  const snap = await getDocs(collection(db, "nfc_links"));

  snap.forEach(async (d) => {
    await setDoc(doc(db, "nfc_links", d.id), {
      device: "",
      status: "libre",
      accesos: 0,
      intentos: 0,
      fecha: ""
    });
  });
}

</script>

</body>
</html>
