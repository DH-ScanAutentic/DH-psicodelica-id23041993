<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel NFC PRO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      padding: 15px;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: #1c1c1c;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .ok { color: #00ff88; }
    .bad { color: #ff4444; }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      margin-top: 8px;
      cursor: pointer;
    }

    .reset {
      background: #ff4444;
      color: white;
    }

    .refresh {
      background: #00aaff;
      color: white;
      width: 100%;
    }
  </style>
</head>

<body>

<h2>🔥 PANEL NFC PRO</h2>

<button class="refresh" onclick="loadData()">🔄 Actualizar</button>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 TU CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

// 📊 CARGAR NFC
window.loadData = async function () {

  list.innerHTML = "Cargando...";

  const snap = await getDocs(collection(db, "nfc_links"));

  list.innerHTML = "";

  snap.forEach(docSnap => {

    const data = docSnap.data();

    const estado = data.device ? "bloqueado" : "libre";

    list.innerHTML += `
      <div class="card">
        <b>${docSnap.id}</b><br>
        Estado: ${estado === "libre" 
          ? '<span class="ok">LIBRE</span>' 
          : '<span class="bad">BLOQUEADO</span>'}
        <br>
        Device: ${data.device || "—"}

        <br>

        <button class="reset" onclick="resetNFC('${docSnap.id}')">
          🔄 Reset
        </button>
      </div>
    `;
  });
}

// 🔄 RESET NFC
window.resetNFC = async function(id) {

  const ref = doc(db, "nfc_links", id);

  await updateDoc(ref, {
    device: "",
    status: "libre"
  });

  alert("NFC reseteado: " + id);
  loadData();
}

loadData();
</script>

</body>
</html>
