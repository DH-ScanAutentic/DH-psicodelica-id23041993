<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DH ADMIN PRO</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }
.header { padding:15px; background:black; text-align:center; font-weight:bold; }
.controls { display:flex; gap:10px; padding:10px; flex-wrap:wrap; }

button, select, input {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1f1f1f;
  color:white;
}

.card {
  background:#1a1a1a;
  margin:10px;
  padding:12px;
  border-radius:10px;
}

.link { font-size:12px; color:#00d4ff; }

#panel { display:none; }
</style>
</head>

<body>

<div id="loginBox">
  <h2>🔐 Login</h2>
  <input id="email" placeholder="Correo"><br><br>
  <input id="pass" type="password" placeholder="Contraseña"><br><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="panel">

<div class="header">🚀 DH CONTROL PRO</div>

<div class="controls">
  <input id="nuevoID" placeholder="nfc001">
  <button onclick="agregarNFC()">Agregar NFC</button>
</div>

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCzhOH6v1EcAeYQLDtYgUPsxQFUb_xeTE",
  authDomain: "nfc-control-b33f4.firebaseapp.com",
  projectId: "nfc-control-b33f4",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.login = async ()=>{
  await signInWithEmailAndPassword(auth,
    email.value, pass.value);
}

onAuthStateChanged(auth,(user)=>{
  if(user){
    loginBox.style.display="none";
    panel.style.display="block";
  }
});

const baseURL = "https://dh-scanautentic.github.io/DH-psicodelica-id23041993/";

// 🎬 LISTA DE VIDEOS (EDITA SOLO AQUÍ)
const videos = [
  "video1.mp4",
  "promo.mp4",
  "fiesta.mp4"
];

window.agregarNFC = async ()=>{
  let id = nuevoID.value.trim();
  if(!id) return alert("Escribe ID");

  await setDoc(doc(db,"nfc_links",id),{
    device:"",
    accesos:0,
    intentos:0,
    video:""
  });

  nuevoID.value="";
}

window.setVideo = async (id, video)=>{
  await setDoc(doc(db,"nfc_links",id),{
    video:video
  },{merge:true});
}

onSnapshot(collection(db,"nfc_links"),snap=>{
  list.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    const id=d.id;

    let select = `<select onchange="setVideo('${id}',this.value)">`;

    videos.forEach(v=>{
      select += `<option value="${v}" ${data.video===v?"selected":""}>${v}</option>`;
    });

    select += `</select>`;

    list.innerHTML+=`
    <div class="card">
      <b>${id}</b><br>
      🔗 ${baseURL}?id=${id}<br>
      ✅ ${data.accesos||0} | ❌ ${data.intentos||0}<br><br>

      🎬 ${select}<br><br>

      <video src="videos/${data.video||""}" width="100%" autoplay muted loop></video>
    </div>
    `;
  });
});

</script>

</body>
</html>
