<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DH ADMIN PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  padding: 15px;
  background: black;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
}

.controls {
  display: flex;
  gap: 10px;
  padding: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #1f1f1f;
  color: white;
}

.card {
  background: #1a1a1a;
  margin: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #2a2a2a;
}

.ok { color: lime; }
.warn { color: orange; }
.danger { color: red; }
</style>
</head>

<body>

<div class="header">🚀 DH CONTROL PRO</div>

<div class="controls">
  <button onclick="load()">Actualizar</button>
  <button onclick="resetAll()">Reset Todo</button>
</div>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCzhOH6v1EcAeYQLDtYgUPsxQFUb_xeTE",
  authDomain: "nfc-control-b33f4.firebaseapp.com",
  projectId: "nfc-control-b33f4",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

window.load = async function() {

  list.innerHTML = "";

  const snap = await getDocs(collection(db, "nfc_links"));

  snap.forEach(d => {

    const data = d.data();

    let estado = "🟢 LIBRE";
    let color = "ok";

    if (data.device) {
      estado = "🔒 EN USO";
      color = "warn";
    }

    if (data.intentos > 0) {
      estado = "🚫 INTENTOS DETECTADOS";
      color = "danger";
    }

    list.innerHTML += `
      <div class="card">
        <b>${d.id}</b><br><br>

        📱 Device:<br>
        ${data.device || "—"}<br><br>

        🕒 Activado:<br>
        ${data.fecha || "—"}<br><br>

        🔢 Accesos: ${data.accesos || 0}<br>
        🚫 Intentos: ${data.intentos || 0}<br><br>

        <span class="${color}">${estado}</span><br><br>

        <button onclick="reset('${d.id}')">Reset</button>
      </div>
    `;
  });
}

window.reset = async function(id) {

  await setDoc(doc(db, "nfc_links", id), {
    device: "",
    status: "libre",
    accesos: 0,
    intentos: 0,
    fecha: ""
  });

  load();
}

window.resetAll = async function() {

  const snap = await getDocs(collection(db, "nfc_links"));

  snap.forEach(async (d) => {
    await setDoc(doc(db, "nfc_links", d.id), {
      device: "",
      status: "libre",
      accesos: 0,
      intentos: 0,
      fecha: ""
    });
  });

  load();
}

load();

</script>

</body>
</html>
