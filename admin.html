<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DH ADMIN GOD MODE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color: white;
}

.header {
  padding: 15px;
  background: black;
  text-align: center;
  font-weight: bold;
}

.controls {
  display: flex;
  gap: 10px;
  padding: 10px;
  flex-wrap: wrap;
}

button, select, input {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #1f1f1f;
  color: white;
}

.card {
  background: #141414;
  margin: 12px;
  padding: 14px;
  border-radius: 15px;
}

.videoPreview {
  width: 100%;
  border-radius: 10px;
}

#panel { display: none; }
#premiumPanel { display: none; }
#panelDios { display: none; }
</style>
</head>

<body>

<div id="loginBox">
  <h2 style="text-align:center;">🔐 Login</h2>
  <div style="text-align:center;">
    <input id="email" placeholder="Correo"><br><br>
    <input id="pass" type="password" placeholder="Contraseña"><br><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="panel">

<div class="header">🚀 DH CONTROL GOD MODE</div>

<div class="controls">
  <button onclick="modoBasico()">Básico</button>
  <button onclick="modoPro()">Pro 🔥</button>
  <button onclick="modoDios()">Dios 😈</button>

  <input id="nuevoID" placeholder="nfc001">
  <button onclick="agregarNFC()">Agregar NFC</button>

  <input id="nuevoVideo" placeholder="video.mp4">
  <button onclick="agregarVideo()">Agregar Video 🎬</button>

  <button onclick="resetAll()">Reset Todo 🔥</button>
</div>

<div id="list"></div>
<div id="premiumPanel"><div id="proList"></div></div>
<div id="panelDios"><div id="diosList"></div></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCzhOH6v1EcAeYQLDtYgUPsxQFUb_xeTE",
  authDomain: "nfc-control-b33f4.firebaseapp.com",
  projectId: "nfc-control-b33f4",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.login = async ()=>{
  await signInWithEmailAndPassword(auth, email.value, pass.value);
}

onAuthStateChanged(auth,(user)=>{
  if(user){
    loginBox.style.display="none";
    panel.style.display="block";
  }
});

const baseURL = "https://dh-scanautentic.github.io/DH-psicodelica-id23041993/";

let videos = [];

async function cargarVideos(){
  const ref = doc(db, "config", "videos");
  const snap = await getDoc(ref);
  if(snap.exists()){
    videos = snap.data().lista || [];
  }
}

window.agregarVideo = async ()=>{
  const nombre = nuevoVideo.value.trim();
  if(!nombre) return alert("Escribe nombre");

  const ref = doc(db, "config", "videos");
  const snap = await getDoc(ref);

  let lista = snap.exists() ? snap.data().lista || [] : [];

  if(lista.includes(nombre)) return alert("Ya existe");

  lista.push(nombre);
  await setDoc(ref, { lista });

  nuevoVideo.value = "";
  await cargarVideos();
  alert("Video agregado");
}

window.agregarNFC = async ()=>{
  let id = nuevoID.value.trim();
  if(!id) return alert("Escribe ID");

  await setDoc(doc(db,"nfc_links",id),{
    device:"",
    accesos:0,
    intentos:0,
    video:"",
    historial:[]
  });

  nuevoID.value="";
}

window.setVideo = async (id, video)=>{
  await setDoc(doc(db,"nfc_links",id),{ video },{merge:true});
}

// 🔄 RESET INDIVIDUAL
window.reset = async (id)=>{
  if(!confirm("Resetear "+id+"?")) return;

  await setDoc(doc(db,"nfc_links",id),{
    device:"",
    accesos:0,
    intentos:0,
    historial:[],
    ultimoAcceso:"",
    video:""
  });
}

// 🔥 RESET TOTAL
window.resetAll = async ()=>{
  if(!confirm("Resetear TODO?")) return;

  const snap = await getDocs(collection(db,"nfc_links"));

  snap.forEach(async d=>{
    await setDoc(doc(db,"nfc_links",d.id),{
      device:"",
      accesos:0,
      intentos:0,
      historial:[],
      ultimoAcceso:"",
      video:""
    });
  });
}

window.modoBasico = ()=>{
  list.style.display="block";
  premiumPanel.style.display="none";
  panelDios.style.display="none";
}

window.modoPro = ()=>{
  list.style.display="none";
  premiumPanel.style.display="block";
  panelDios.style.display="none";
}

window.modoDios = ()=>{
  list.style.display="none";
  premiumPanel.style.display="none";
  panelDios.style.display="block";
}

await cargarVideos();

onSnapshot(collection(db,"nfc_links"),snap=>{
  list.innerHTML="";
  proList.innerHTML="";
  diosList.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    const id=d.id;

    let select = `<select onchange="setVideo('${id}',this.value)">`;
    videos.forEach(v=>{
      select += `<option value="${v}" ${data.video===v?"selected":""}>${v}</option>`;
    });
    select += `</select>`;

    // básico
    list.innerHTML+=`
    <div class="card">
      <b>${id}</b><br>
      🔗 ${baseURL}?id=${id}<br>
      ✅ ${data.accesos||0} | ❌ ${data.intentos||0}<br>
      ${select}<br><br>
      <button onclick="reset('${id}')">Reset</button>
    </div>`;

    // pro (🔥 CORREGIDO SIN /videos/)
    proList.innerHTML+=`
    <div class="card">
      <h3>${id}</h3>
      <video class="videoPreview" autoplay muted loop controls>
        <source src="https://dh-scanautentic.github.io/DH-psicodelica-id23041993/${data.video || 'video.mp4'}" type="video/mp4">
      </video>
      ${select}<br><br>
      <button onclick="reset('${id}')">Reset</button>
    </div>`;

    // dios
    let historialHTML = "";
    (data.historial || []).slice(-5).reverse().forEach(h=>{
      historialHTML += `<div>${h.tipo==="permitido"?"🟢":"🔴"} ${h.fecha}</div>`;
    });

    diosList.innerHTML+=`
    <div class="card">
      <h3>${id}</h3>
      <p>📊 ${data.accesos||0}</p>
      <p>🚫 ${data.intentos||0}</p>
      <p>🕒 ${data.ultimoAcceso||"—"}</p>
      ${historialHTML}
    </div>`;
  });
});

</script>

</body>
</html>
