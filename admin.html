<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN NFC</title>
</head>
<body>

<h2>Panel NFC</h2>
<button onclick="load()">Cargar NFC</button>
<button onclick="resetAll()">Reset todo</button>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCzhOH6v1EcAeYQLDtYgUPsxQFUb_xeTE",
  authDomain: "nfc-control-b33f4.firebaseapp.com",
  projectId: "nfc-control-b33f4",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

// 📊 cargar NFC
window.load = async function() {

  list.innerHTML = "Cargando...";

  const snap = await getDocs(collection(db, "nfc_links"));

  list.innerHTML = "";

  snap.forEach(docu => {

    const d = docu.data();

    list.innerHTML += `
      <div style="margin:10px;padding:10px;border:1px solid #ccc">
        <b>${docu.id}</b><br>
        Device: ${d.device || "libre"}<br>
        <button onclick="reset('${docu.id}')">Reset</button>
      </div>
    `;
  });
}

// 🔁 reset individual
window.reset = async function(id) {
  await setDoc(doc(db, "nfc_links", id), {
    device: "",
    status: "libre"
  });

  load();
}

// 🔁 reset todo
window.resetAll = async function() {

  const snap = await getDocs(collection(db, "nfc_links"));

  snap.forEach(async (d) => {
    await setDoc(doc(db, "nfc_links", d.id), {
      device: "",
      status: "libre"
    });
  });

  alert("Reset completo");
}

</script>

</body>
</html>
