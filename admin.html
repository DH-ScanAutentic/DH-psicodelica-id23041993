<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PANEL NFC PRO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      padding: 15px;
    }

    h2 { text-align: center; }

    .card {
      background: #1e1e1e;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .ok { color: #00ff88; }
    .bad { color: #ff4444; }

    button {
      padding: 8px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .reset {
      background: red;
      color: white;
    }

    .refresh {
      background: #00aaff;
      color: white;
      width: 100%;
    }
  </style>
</head>

<body>

<h2>🔥 PANEL NFC PRO</h2>

<button class="refresh" onclick="load()">🔄 Actualizar</button>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCzhOH6v1EcAeYQLDtYgUPsxQFUb_xeTE",
  authDomain: "nfc-control-b33f4.firebaseapp.com",
  projectId: "nfc-control-b33f4",
  storageBucket: "nfc-control-b33f4.firebasestorage.app",
  messagingSenderId: "970163715550",
  appId: "1:970163715550:web:59011e23ca08a213a5714f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

window.load = async function () {

  list.innerHTML = "Cargando...";

  const snap = await getDocs(collection(db, "nfc_links"));

  list.innerHTML = "";

  snap.forEach(docSnap => {

    const d = docSnap.data();
    const estado = d.device ? "bloqueado" : "libre";

    list.innerHTML += `
      <div class="card">
        <b>${docSnap.id}</b><br>
        Estado: ${estado === "libre" ? '<span class="ok">LIBRE</span>' : '<span class="bad">USADO</span>'}
        <br>
        Device: ${d.device || "—"}

        <button class="reset" onclick="reset('${docSnap.id}')">
          🔄 Reset
        </button>
      </div>
    `;
  });
}

window.reset = async function(id) {

  const ref = doc(db, "nfc_links", id);

  await updateDoc(ref, {
    device: "",
    status: "libre"
  });

  alert("Reset: " + id);
  load();
}

load();
</script>

</body>
</html>
