<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DH ADMIN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  padding: 15px;
  background: black;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
  border-bottom: 1px solid #222;
}

.controls {
  display: flex;
  gap: 10px;
  padding: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  background: #1f1f1f;
  color: white;
}

button:active {
  transform: scale(0.95);
}

.list {
  padding: 10px;
}

.card {
  background: #1a1a1a;
  margin-bottom: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #2a2a2a;
}

.id {
  font-weight: bold;
  font-size: 16px;
}

.status {
  margin-top: 5px;
  font-size: 13px;
}

.libre {
  color: lime;
}

.ocupado {
  color: orange;
}

.btn-reset {
  margin-top: 10px;
  background: red;
}
</style>
</head>

<body>

<div class="header">⚙️ DH NFC CONTROL</div>

<div class="controls">
  <button onclick="load()">Actualizar</button>
  <button onclick="resetAll()">Reset Todo</button>
</div>

<div class="list" id="list">Cargando...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCzhOH6v1EcAeYQLDtYgUPsxQFUb_xeTE",
  authDomain: "nfc-control-b33f4.firebaseapp.com",
  projectId: "nfc-control-b33f4",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

window.load = async function() {

  list.innerHTML = "Cargando...";

  const snap = await getDocs(collection(db, "nfc_links"));

  list.innerHTML = "";

  snap.forEach(d => {

    const data = d.data();

    const estado = data.device ? "ocupado" : "libre";

    list.innerHTML += `
      <div class="card">
        <div class="id">${d.id}</div>
        <div class="status ${estado}">
          ${data.device ? "🔒 EN USO" : "🟢 LIBRE"}
        </div>
        <button class="btn-reset" onclick="reset('${d.id}')">
          Reset NFC
        </button>
      </div>
    `;
  });
}

// reset individual
window.reset = async function(id) {

  await setDoc(doc(db, "nfc_links", id), {
    device: "",
    status: "libre"
  });

  load();
}

// reset total
window.resetAll = async function() {

  const snap = await getDocs(collection(db, "nfc_links"));

  snap.forEach(async (d) => {
    await setDoc(doc(db, "nfc_links", d.id), {
      device: "",
      status: "libre"
    });
  });

  alert("Todos los NFC fueron liberados");
  load();
}

// carga inicial
load();

</script>

</body>
</html>
