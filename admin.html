<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DH ADMIN PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  padding: 15px;
  background: black;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
}

.controls {
  display: flex;
  gap: 10px;
  padding: 10px;
  flex-wrap: wrap;
}

button, input {
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #1f1f1f;
  color: white;
}

button {
  cursor: pointer;
}

.card {
  background: #1a1a1a;
  margin: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #2a2a2a;
}

.link {
  font-size: 12px;
  color: #00d4ff;
  word-break: break-all;
}

#loginBox {
  padding: 20px;
  text-align: center;
}

#panel {
  display: none;
}

#premiumPanel {
  display: none;
}
</style>
</head>

<body>

<div id="loginBox">
  <h2>🔐 Login</h2>
  <input id="email" placeholder="Correo"><br><br>
  <input id="pass" type="password" placeholder="Contraseña"><br><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="panel">

<div class="header">🚀 DH CONTROL PRO</div>

<div class="controls">
  <button onclick="activarPremium()">Modo Pro 🔥</button>
  <button onclick="activarBasico()">Modo Básico</button>

  <button onclick="resetAll()">Reset Todo</button>

  <input type="text" id="nuevoID" placeholder="nfc003">
  <button onclick="agregarNFC()">Agregar NFC</button>
</div>

<div id="list"></div>

<div id="premiumPanel">
  <h2 style="padding:10px;">Panel Visual</h2>
  <div id="contenedorPremium"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCzhOH6v1EcAeYQLDtYgUPsxQFUb_xeTE",
  authDomain: "nfc-control-b33f4.firebaseapp.com",
  projectId: "nfc-control-b33f4",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔐 LOGIN
window.login = async function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  await signInWithEmailAndPassword(auth, email, pass);
}

// 🔒 SESIÓN
onAuthStateChanged(auth, (user)=>{
  if(user){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  }
});

const list = document.getElementById("list");
const baseURL = "https://dh-scanautentic.github.io/DH-psicodelica-id23041993/";

window.agregarNFC = async function() {
  let id = document.getElementById("nuevoID").value.trim();
  if (!id) return alert("Escribe un ID");

  await setDoc(doc(db, "nfc_links", id), {
    device: "",
    status: "libre",
    accesos: 0,
    intentos: 0,
    fecha: "",
    video: ""
  });

  document.getElementById("nuevoID").value = "";
}

window.reset = async function(id) {
  if (!confirm("¿Resetear " + id + "?")) return;

  await setDoc(doc(db, "nfc_links", id), {
    device: "",
    status: "libre",
    accesos: 0,
    intentos: 0,
    fecha: "",
    video: ""
  });
}

window.resetAll = async function() {
  if (!confirm("¿Resetear todo?")) return;

  const snap = await getDocs(collection(db, "nfc_links"));
  snap.forEach(async (d) => {
    await setDoc(doc(db, "nfc_links", d.id), {
      device: "",
      status: "libre",
      accesos: 0,
      intentos: 0,
      fecha: "",
      video: ""
    });
  });
}

// 🔥 NUEVO: GUARDAR VIDEO
window.guardarVideo = async function(id) {
  let url = prompt("Pega el link del video o gif");
  if (!url) return;

  await setDoc(doc(db, "nfc_links", id), {
    video: url
  }, { merge: true });
}

// 🔥 RENDER
let currentSnap = null;

function renderSnapshot(snap) {
  list.innerHTML = "";

  snap.forEach(d => {
    const data = d.data();
    const id = d.id.toLowerCase().trim();
    const link = baseURL + "?id=" + id;

    list.innerHTML += `
      <div class="card">
        <b>${d.id}</b><br>
        🔗 <span class="link">${link}</span><br>
        📱 ${data.device || "—"}<br>
        ✅ Accesos: ${data.accesos || 0}<br>
        ❌ Bloqueados: ${data.intentos || 0}<br><br>

        <button onclick="copiarLink('${link}')">Copiar</button>
        <button onclick="guardarVideo('${d.id}')">Asignar Video</button>
        <button onclick="reset('${d.id}')">Reset</button>
      </div>
    `;
  });

  cargarPremium(snap);
}

// copiar
window.copiarLink = function(link) {
  navigator.clipboard.writeText(link);
  alert("Link copiado");
}

// 🔥 PREMIUM VISUAL
window.activarPremium = function(){
  document.getElementById("list").style.display = "none";
  document.getElementById("premiumPanel").style.display = "block";
}

window.activarBasico = function(){
  document.getElementById("list").style.display = "block";
  document.getElementById("premiumPanel").style.display = "none";
}

function cargarPremium(snap){
  const cont = document.getElementById("contenedorPremium");
  cont.innerHTML = "";

  snap.forEach(d=>{
    const data = d.data();
    const id = d.id.toLowerCase().trim();
    const link = baseURL + "?id=" + id;

    cont.innerHTML += `
      <div class="card">
        <h3>${id}</h3>
        <video src="${data.video || ""}" width="100%" autoplay muted loop></video>
        <p>${link}</p>
        <button onclick="guardarVideo('${d.id}')">Cambiar Video</button>
        <button onclick="reset('${d.id}')">Reset</button>
      </div>
    `;
  });
}

// 🔥 REALTIME
onSnapshot(collection(db, "nfc_links"), (snap) => {
  currentSnap = snap;
  renderSnapshot(snap);
});

</script>

</body>
</html>
