<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>DH ACCESS</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<video id="video" autoplay muted playsinline loop>
  <source src="./video.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("video");

  // Forzar reproducción (clave en móviles)
  video.play().catch(() => {
    document.addEventListener("click", () => {
      video.play();
    });
  });
</script>

</body>
</html>
