<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>DH ACCESS</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mensaje {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      color: white;
      font-family: Arial;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 1px;
      text-align: center;
      opacity: 0.9;
      z-index: 2;
      transition: opacity 0.5s ease;
      animation: parpadeo 1.5s infinite;
    }

    @keyframes parpadeo {
      0% { opacity: 0.9; }
      50% { opacity: 0.4; }
      100% { opacity: 0.9; }
    }
  </style>
</head>

<body>

<video id="v" autoplay muted playsinline loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="mensaje">TAP TO ENABLE AUDIO 🔊</div>

<script>
  const v = document.getElementById("v");
  const mensaje = document.querySelector(".mensaje");

  document.addEventListener("click", () => {

    // 🔊 Activar sonido
    v.muted = false;
    v.play();

    // 📳 Vibración tipo NFC
    if (navigator.vibrate) {
      navigator.vibrate(50);
    }

    // 📱 Pantalla completa
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    }

    // 🧼 Ocultar mensaje con animación
    mensaje.style.opacity = "0";
    setTimeout(() => {
      mensaje.style.display = "none";
    }, 500);

  });
</script>

</body>
</html>
