<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>DH ACCESS</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mensaje {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      color: white;
      font-family: Arial;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 1px;
      text-align: center;
      opacity: 0.9;
      z-index: 2;
      transition: opacity 0.5s ease;
      animation: parpadeo 1.5s infinite;
    }

    @keyframes parpadeo {
      0% { opacity: 0.9; }
      50% { opacity: 0.4; }
      100% { opacity: 0.9; }
    }
  </style>
</head>

<body>

<video id="v" autoplay muted playsinline loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="mensaje">TAP TO ENABLE AUDIO 🔊</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 TU FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyBCzhOH6v1EcAeYQLDtYgUPsxQFUb_xeTE",
    authDomain: "nfc-control-b33f4.firebaseapp.com",
    projectId: "nfc-control-b33f4",
    storageBucket: "nfc-control-b33f4.firebasestorage.app",
    messagingSenderId: "970163715550",
    appId: "1:970163715550:web:59011e23ca08a213a5714f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📌 leer NFC (?id=NFC001)
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// 📱 dispositivo
const deviceId = navigator.userAgent;

async function checkAccess() {

  if (!id) {
    document.body.innerHTML = "❌ SIN NFC";
    return;
  }

  const ref = doc(db, "nfc_links", id);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    document.body.innerHTML = "❌ NFC NO EXISTE";
    return;
  }

  const data = snap.data();

  // 🟢 primera vez
  if (data.device === "") {

    await setDoc(ref, {
      ...data,
      device: deviceId,
      status: "bloqueado"
    });

    startVideo();
    return;
  }

  // 🟢 mismo dispositivo
  if (data.device === deviceId) {
    startVideo();
    return;
  }

  // 🔴 otro dispositivo
  document.body.innerHTML = "⛔ ACCESO BLOQUEADO";
}

function startVideo() {
  const v = document.getElementById("v");
  const mensaje = document.querySelector(".mensaje");

  document.addEventListener("click", () => {

    v.muted = false;
    v.play();

    if (navigator.vibrate) navigator.vibrate(50);

    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    }

    mensaje.style.opacity = "0";
    setTimeout(() => mensaje.style.display = "none", 500);
  });
}

checkAccess();
</script>

</body>
</html>
