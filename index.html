<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DH ACCESS</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    video {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mensaje {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: Arial;
      background: rgba(0,0,0,0.6);
      padding: 10px 15px;
      border-radius: 8px;
      font-weight: bold;
    }

    .status {
      position: fixed;
      top: 10px;
      left: 10px;
      color: lime;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.5);
      padding: 5px;
    }
  </style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video id="video" autoplay muted playsinline loop>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- 💬 MENSAJE -->
<div class="mensaje">Toca para activar audio 🔊</div>

<!-- 📊 STATUS -->
<div class="status" id="status">Cargando...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBCzhOH6v1EcAeYQLDtYgUPsxQFUb_xeTE",
  authDomain: "nfc-control-b33f4.firebaseapp.com",
  projectId: "nfc-control-b33f4",
  storageBucket: "nfc-control-b33f4.firebasestorage.app",
  messagingSenderId: "970163715550",
  appId: "1:970163715550:web:59011e23ca08a213a5714f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📌 NFC ID
const params = new URLSearchParams(location.search);
const id = params.get("id");

// 📱 dispositivo
const deviceId = navigator.userAgent;

const status = document.getElementById("status");

// 🎬 video control
function playVideo() {
  const video = document.getElementById("video");
  const msg = document.querySelector(".mensaje");

  document.addEventListener("click", () => {
    video.muted = false;
    video.play();
    msg.style.display = "none";
  });
}

// 🔐 lógica NFC
async function checkNFC() {

  try {

    if (!id) {
      status.innerText = "❌ Sin NFC ID";
      return;
    }

    const ref = doc(db, "nfc_links", id);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      status.innerText = "❌ NFC no existe";
      return;
    }

    const data = snap.data();

    // 🟢 primer uso
    if (!data.device) {
      await setDoc(ref, {
        device: deviceId,
        status: "activo"
      });

      status.innerText = "🟢 Activado por primera vez";
      playVideo();
      return;
    }

    // 🟢 mismo dispositivo
    if (data.device === deviceId) {
      status.innerText = "🟢 Acceso permitido";
      playVideo();
      return;
    }

    // 🔴 otro dispositivo
    status.innerText = "⛔ Bloqueado en otro dispositivo";

  } catch (e) {
    status.innerText = "⚠️ Error sistema";
  }
}

checkNFC();

</script>

</body>
</html>
