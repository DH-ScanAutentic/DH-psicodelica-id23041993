<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>DH ACCESS</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mensaje {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial;
      font-size: 14px;
      opacity: 0.8;
      z-index: 2;
      transition: opacity 0.5s ease;
    }
  </style>
</head>

<body>

<video id="v" autoplay muted playsinline loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="mensaje">TOCA PARA ACTIVAR AUDIO</div>

<script>
  const v = document.getElementById("v");
  const mensaje = document.querySelector(".mensaje");

  // 📳 Vibración al abrir (simula escaneo NFC)
  window.addEventListener("load", () => {
    if (navigator.vibrate) {
      navigator.vibrate([100, 50, 100]); // patrón más pro
    }
  });

  document.addEventListener("click", () => {

    // 🔊 Activar sonido
    v.muted = false;
    v.play();

    // 📱 Pantalla completa
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    }

    // 🧼 Ocultar mensaje
    mensaje.style.opacity = "0";
    setTimeout(() => {
      mensaje.style.display = "none";
    }, 500);

  });
</script>

</body>
</html>
