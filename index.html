<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DH ACCESS</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mensaje {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial;
      font-size: 14px;
      opacity: 0.7;
      z-index: 2;
    }
  </style>
</head>

<body>

<video id="v" autoplay muted playsinline loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="mensaje">Toca la pantalla para activar sonido</div>

<script>
  const v = document.getElementById("v");
  const mensaje = document.querySelector(".mensaje");

  document.addEventListener("click", () => {
    v.muted = false;
    v.play();
    mensaje.style.display = "none";
  });
</script>

</body>
</html>
