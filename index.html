<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DH ACCESS</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  height: 100%;
  overflow: hidden;
}

video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.mensaje {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  font-family: Arial;
  font-weight: bold;
}

.status {
  position: fixed;
  top: 10px;
  left: 10px;
  color: lime;
  font-family: monospace;
  font-size: 12px;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline loop>
<source src="video.mp4" type="video/mp4">
</video>

<div class="mensaje">Toca para activar audio 🔊</div>
<div class="status" id="status">Cargando...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCzhOH6v1EcAeYQLDtYgUPsxQFUb_xeTE",
  authDomain: "nfc-control-b33f4.firebaseapp.com",
  projectId: "nfc-control-b33f4",
  storageBucket: "nfc-control-b33f4.firebasestorage.app",
  messagingSenderId: "970163715550",
  appId: "1:970163715550:web:59011e23ca08a213a5714f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");
const deviceId = navigator.userAgent;

const status = document.getElementById("status");

function enableVideo() {
  const video = document.getElementById("video");
  const msg = document.querySelector(".mensaje");

  document.addEventListener("click", () => {
    video.muted = false;
    video.play();
    msg.style.display = "none";

    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(()=>{});
    }
  });
}

async function check() {

  try {

    if (!id) {
      status.innerText = "⚠️ Sin NFC (modo libre)";
      enableVideo();
      return;
    }

    const ref = doc(db, "nfc_links", id);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      status.innerText = "❌ NFC no existe";
      enableVideo();
      return;
    }

    const data = snap.data();

    if (!data.device) {
      await setDoc(ref, {
        device: deviceId,
        status: "activo"
      });

      status.innerText = "🟢 Activado";
      enableVideo();
      return;
    }

    if (data.device === deviceId) {
      status.innerText = "🟢 Acceso permitido";
      enableVideo();
      return;
    }

    status.innerText = "⛔ Bloqueado en otro dispositivo";

  } catch (e) {
    status.innerText = "⚠️ Error sistema";
    enableVideo();
  }
}

check();

</script>

</body>
</html>
