<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DH ACCESS</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  height: 100%;
  overflow: hidden;
}

/* 🔥 INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 999;
  transition: opacity 0.4s ease;
}

#intro video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.fade-out {
  opacity: 0;
  transform: scale(1.02);
}

/* 🎬 VIDEO PRINCIPAL */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

/* mensaje audio */
.mensaje {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  font-family: Arial;
  font-weight: bold;
  display: none;
}

.status {
  position: fixed;
  top: 10px;
  left: 10px;
  color: lime;
  font-family: monospace;
  font-size: 12px;
}
</style>
</head>

<body>

<!-- 🔥 INTRO VIDEO (3s) -->
<div id="intro">
  <video autoplay muted playsinline>
    <source src="https://dh-scanautentic.github.io/DH-psicodelica-id23041993/intro.mp4" type="video/mp4">
  </video>
</div>

<!-- 🎬 VIDEO FINAL -->
<video id="video" autoplay muted playsinline loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="mensaje">Toca para activar audio 🔊</div>
<div class="status" id="status">Verificando acceso...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCzhOH6v1EcAeYQLDtYgUPsxQFUb_xeTE",
  authDomain: "nfc-control-b33f4.firebaseapp.com",
  projectId: "nfc-control-b33f4",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

let deviceId = localStorage.getItem("device_id");
if (!deviceId) {
  deviceId = crypto.randomUUID();
  localStorage.setItem("device_id", deviceId);
}

const status = document.getElementById("status");

/* 🔥 TRANSICIÓN iPHONE */
function showContent() {

  const intro = document.getElementById("intro");
  const video = document.getElementById("video");
  const msg = document.querySelector(".mensaje");

  intro.classList.add("fade-out");

  setTimeout(() => {
    intro.style.display = "none";

    video.style.display = "block";
    msg.style.display = "block";
  }, 400);
}

/* 🔊 activar audio */
function enableVideo() {

  const video = document.getElementById("video");
  const msg = document.querySelector(".mensaje");

  document.addEventListener("click", () => {

    video.muted = false;
    video.play();

    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(()=>{});
    }

    msg.style.display = "none";
  });
}

function bloquear(texto = "ACCESO DENEGADO") {

  document.body.style.background = "black";

  const bloqueo = document.createElement("div");
  bloqueo.innerText = texto;
  bloqueo.style.position = "fixed";
  bloqueo.style.top = "50%";
  bloqueo.style.left = "50%";
  bloqueo.style.transform = "translate(-50%, -50%)";
  bloqueo.style.color = "red";
  bloqueo.style.fontSize = "26px";
  bloqueo.style.fontWeight = "bold";

  document.body.appendChild(bloqueo);
}

async function check() {

  try {

    if (!id) {
      status.innerText = "⛔ Acceso inválido";
      bloquear();
      return;
    }

    const ref = doc(db, "nfc_links", id);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      status.innerText = "⛔ NFC inválido";
      bloquear();
      return;
    }

    const data = snap.data();

    if (!data.device) {

      await setDoc(ref, {
        device: deviceId,
        status: "activo",
        fecha: new Date().toLocaleString(),
        accesos: 1,
        intentos: 0
      });

      status.innerText = "🟢 Activado";

      setTimeout(() => {
        showContent();
        enableVideo();
      }, 3000);

      return;
    }

    if (data.device === deviceId) {

      await setDoc(ref, {
        ...data,
        accesos: (data.accesos || 0) + 1
      });

      status.innerText = "🟢 Acceso permitido";

      setTimeout(() => {
        showContent();
        enableVideo();
      }, 3000);

      return;
    }

    await setDoc(ref, {
      ...data,
      intentos: (data.intentos || 0) + 1
    });

    status.innerText = "⛔ Bloqueado";
    bloquear();

  } catch (e) {
    status.innerText = "⛔ Error";
    bloquear("ERROR");
  }
}

check();

</script>

</body>
</html>
